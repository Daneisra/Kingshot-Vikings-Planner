name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: kingshot-vikings-planner-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_FRONTEND_DIR: ${{ secrets.VPS_FRONTEND_DIR }}
        run: |
          set -euo pipefail
          for secret_name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_PRIVATE_KEY VPS_SSH_KNOWN_HOSTS VPS_APP_DIR VPS_FRONTEND_DIR; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: $secret_name" >&2
              exit 1
            fi
          done

      - name: Configure SSH
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: SSH preflight
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            APP_DIR="$VPS_APP_DIR" bash -s -- <<'EOF'
          set -euo pipefail

          for candidate in "$HOME/.profile" "$HOME/.bash_profile" "$HOME/.bashrc"; do
            if [ -f "$candidate" ]; then
              . "$candidate"
            fi
          done

          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
          fi

          if [ -d "$HOME/.local/bin" ]; then
            export PATH="$HOME/.local/bin:$PATH"
          fi

          if [ -d "$HOME/bin" ]; then
            export PATH="$HOME/bin:$PATH"
          fi

          echo "[preflight] user=$(whoami)"
          echo "[preflight] home=$HOME"
          echo "[preflight] app_dir=$APP_DIR"
          test -d "$APP_DIR"
          test -d "$APP_DIR/.git"

          for cmd in git npm pm2 rsync curl sha256sum; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              echo "[preflight] missing=$cmd" >&2
              exit 1
            fi
            echo "[preflight] $cmd=$(command -v "$cmd")"
          done

          git -C "$APP_DIR" remote -v
          git -C "$APP_DIR" rev-parse --abbrev-ref HEAD
          EOF

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_FRONTEND_DIR: ${{ secrets.VPS_FRONTEND_DIR }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            APP_DIR="$VPS_APP_DIR" FRONTEND_DIR="$VPS_FRONTEND_DIR" BRANCH="main" bash -s -- <<'EOF'
          set -euo pipefail
          test -d "$APP_DIR/.git"
          bash -x "$APP_DIR/deploy/scripts/deploy.sh"
          EOF
